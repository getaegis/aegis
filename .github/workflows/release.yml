name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    name: Publish npm & Docker
    if: github.repository == 'getaegis/aegis'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install dashboard dependencies
        run: cd dashboard && yarn install --immutable

      - name: Lint & Type check
        run: yarn verify

      - name: Test
        run: yarn test

      - name: Build
        run: yarn build

      # --- npm publish ---
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Docker build & push ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/getaegis/aegis:${{ steps.version.outputs.VERSION }}
            ghcr.io/getaegis/aegis:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- GitHub Release ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      # --- Update Homebrew tap ---
      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://registry.npmjs.org/@getaegis/cli/-/cli-${VERSION}.tgz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/getaegis/homebrew-aegis.git /tmp/homebrew-aegis
          cd /tmp/homebrew-aegis

          cat > Formula/aegis.rb << EOF
          class Aegis < Formula
            desc "Credential isolation for AI agents"
            homepage "https://github.com/getaegis/aegis"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"

            depends_on "node@24"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink Dir["\#{libexec}/bin/*"]
            end

            test do
              assert_match "Aegis", shell_output("\#{bin}/aegis --help")
            end
          end
          EOF

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/aegis.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aegis.rb
          git commit -m "chore: bump aegis to v${VERSION}"
          git push
