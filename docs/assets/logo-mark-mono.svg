  <circle fill="none" stroke="#E8ECEF" cx="50" cy="50" r="36" stroke-width="1.2"/>
  <circle fill="none" stroke="#E8ECEF" cx="50" cy="50" r="14" stroke-width="1.5"/>
  <circle fill="#E8ECEF" cx="50" cy="50" r="5.5"/>
</svg>
