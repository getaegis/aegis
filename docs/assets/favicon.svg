<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Aegis Favicon
    Simplified shield mark for favicon/16x16/32x32 contexts.
    Drops radiating lines (too busy at small sizes).
    Keeps: outer circle, inner ring, boss ring, central dot.
    Color: Aegis Gold (#C8973E) on transparent.
  -->
  <circle fill="none" stroke="#C8973E" cx="16" cy="16" r="14" stroke-width="1.5"/>
  <circle fill="none" stroke="#C8973E" cx="16" cy="16" r="11.5" stroke-width="0.8"/>
  <circle fill="none" stroke="#C8973E" cx="16" cy="16" r="4.5" stroke-width="1"/>
  <circle fill="#C8973E" cx="16" cy="16" r="1.8"/>
</svg>
