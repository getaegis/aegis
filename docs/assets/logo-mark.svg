<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!--
    Aegis Shield Mark
    Concentric circles evoking a Greek aspis (round shield) with central boss.
    Use: standalone mark, avatar, documentation.
    Color: Aegis Gold (#C8973E) on transparent.
  -->

  <!-- Outer shield circle (the aspis body) -->
  <circle fill="none" stroke="#C8973E" cx="50" cy="50" r="44" stroke-width="2.5"/>

  <!-- Inner rim ring (close to outer — creates a thick rim band) -->
  <circle fill="none" stroke="#C8973E" cx="50" cy="50" r="36" stroke-width="1.2"/>

  <!-- Boss ring -->
  <circle fill="none" stroke="#C8973E" cx="50" cy="50" r="14" stroke-width="1.5"/>

  <!-- Central dot -->
  <circle fill="#C8973E" cx="50" cy="50" r="5.5"/>
</svg>
